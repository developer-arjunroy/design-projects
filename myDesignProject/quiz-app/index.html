<!doctype html>
<html>
    <head>
        <title>Quiz App</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body style="background: linear-gradient(135deg, #4f46e5, #9333ea)">
        <div class="center-card">
            <h1 class="index-title">Quiz Master</h1>
            <p class="subtitle">
                Test your knowledge with fun and interactive quizzes!
            </p>
            <input
                type="text"
                placeholder="Enter Your Name"
                class="name-field"
            />
            <button type="button" class="btn" id="start-btn">Start Quiz</button>
        </div>
        <script src="./script/script.js" type="module"></script>
    </body>
</html>

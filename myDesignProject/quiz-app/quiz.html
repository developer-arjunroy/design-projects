<!doctype html>
<html>

        <link rel="stylesheet" href="styles.css" />
    </head>

        <div id="quiz-container">
            <div class="quiz-container_quiz-info">
                <p id="question-limit"></p>
                <span id="timer">15s</span>

            </button>
        </div>
        <script src="./script/quiz.js" type="module"></script>
        <script src="./script/db.js" type="module"></script>
    </body>
</html>

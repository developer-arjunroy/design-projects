<!dotype html>
<html>
    <head>
        <meta lang="en" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>Calculator App</title>
    </head>
    <body>
        <div id="calculator-app">
            <div id="display">
                <p class="exp"></p>
                <!--<p class="exp">15,250</p>-->
            </div>
            <div id="key-area">
                <!--first row -->
                <button class="top-left-exp reset-btn">AC</button>
                <button class="top-left-exp">+/-</button>
                <button class="top-left-exp">%</button>
                <button class="right-exp num-btn">/</button>
                <!--second row-->
                <button class="num-btn">7</button>
                <button class="num-btn">8</button>
                <button class="num-btn">9</button>
                <button class="right-exp num-btn">*</button>
                <!--third roe-->
                <button class="num-btn">4</button>
                <button class="num-btn">5</button>
                <button class="num-btn">6</button>
                <button class="right-exp num-btn">-</button>
                <!--fourth row-->
                <button class="num-btn">1</button>
                <button class="num-btn">2</button>
                <button class="num-btn">3</button>
                <button class="right-exp num-btn">+</button>
                <!--fifth row-->
                <button class="last-row back-btn">reset</button>
                <button class="last-row num-btn">0</button>
                <button class="last-row num-btn">.</button>
                <button class="last-row right-exp">=</button>
            </div>
        </div>

        <!--script-->
        <script src="script.js"></script>
    </body>
</html>

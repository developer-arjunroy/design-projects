<!doctype html>
<html>
    <head>
        <title>Playing Cards</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main id="playing-cards">
            <div class="card">
                <div class="left">
                    <p>A</p>
                    <span>♠</span>
                </div>
                <div class="middle">
                    <span>♠</span>
                </div>
                <div class="right">
                    <p>A</p>
                    <span>♠</span>
                </div>
            </div>
            <div class="card">
                <div class="left">
                    <p>2</p>
                    <span>♣</span>
                </div>
                <div class="middle">
                    <span>♣</span>
                    <span>♣</span>
                </div>
                <div class="right">
                    <p>2</p>
                    <span>♣</span>
                </div>
            </div>
            <div class="card">
                <div class="left">
                    <p>3</p>
                    <span>♥</span>
                </div>
                <div class="middle">
                    <span>♥</span>
                    <span>♥</span>
                    <span>♥</span>
                </div>
                <div class="right">
                    <p>3</p>
                    <span>♥</span>
                </div>
            </div>
        </main>
    </body>
</html>
